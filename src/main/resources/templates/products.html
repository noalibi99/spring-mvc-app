<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    layout:decorate="layout">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
<div class="p-3" layout:fragment="content">
    <div class="p-3">
        <h1>Products</h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/new}" class="btn btn-primary mb-3">Add New Product</a>
    </div>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.name}">Product Name</td>
            <td th:text="${product.price}">Product Price</td>
            <td th:text="${product.quantity}">Product Quantity</td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/edit/{id}(id=${product.id})}" class="btn btn-primary btn-sm">Edit</a>
            </td>
            <td>
                <form method="post" th:action="@{/delete(id=${product.id})}" onsubmit="return confirm('Are you sure you want to delete this product?');">
                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
