<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="layout">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
<div class="p-3" layout:fragment="content">
    <h1>Edit Product</h1>
    <form th:action="@{/save}" method="post">
        <div class="mb-3">
            <input type="hidden" name="id" th:value="${product.id}">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" name="name" th:value="${product.name}" required>
            <span class="text-danger" th:errors="${product.name}"></span>
            <label for="price" class="for-label">Price</label>
            <input type="number" class="form-control" id="price" name="price" th:value="${product.price}" required>
            <span class="text-danger" th:errors="${product.price}"></span>
            <label for="quantity" class="for-label">Quantity</label>
            <input type="number" class="form-control" id="quantity" name="quantity" th:value="${product.quantity}" required>
            <span class="text-danger" th:errors="${product.price}"></span>
            <button type="submit" class="btn btn-success">Save</button>
        </div>
    </form>
</div>
</body>
</html>
